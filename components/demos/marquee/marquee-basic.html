<style>
  @keyframes marquee-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-track {
    animation: marquee-left 25s linear infinite;
  }
  .marquee-wrap:hover .marquee-track {
    animation-play-state: paused;
  }
</style>
